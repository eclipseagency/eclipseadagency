  <text x="570" y="148" font-family="Inter,sans-serif" font-size="10" fill="#ff6b35" opacity="0.3">100%</text>
  <text x="510" y="225" font-family="Inter,sans-serif" font-size="10" fill="#ff6b35" opacity="0.25">42%</text>
  <text x="475" y="275" font-family="Inter,sans-serif" font-size="10" fill="#ff8c42" opacity="0.25">18%</text>
  <text x="455" y="345" font-family="Inter,sans-serif" font-size="10" fill="#ff6b35" opacity="0.35">4.2%</text>
  <text x="400" y="420" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#ff6b35" text-anchor="middle" opacity="0.35">CONVERSION OPTIMIZATION</text>
  <g stroke="#ff6b35" stroke-width="1" opacity="0.18">
