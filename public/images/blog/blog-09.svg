  <line x1="310" y1="220" x2="490" y2="220" stroke="#ff6b35" stroke-width="0.5" opacity="0.12"/>
  <line x1="340" y1="270" x2="460" y2="270" stroke="#ff6b35" stroke-width="0.5" opacity="0.12"/>
