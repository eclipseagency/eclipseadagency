  <circle cx="380" cy="95" r="3" fill="#ff8c42" opacity="0.35" filter="url(#glow09)"/>
  <circle cx="440" cy="100" r="3" fill="#ff6b35" opacity="0.4" filter="url(#glow09)"/>
  <circle cx="500" cy="98" r="3" fill="#ff8c42" opacity="0.3" filter="url(#glow09)"/>
