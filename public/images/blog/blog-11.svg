<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/><stop offset="100%" style="stop-color:#12101e"/>
    </linearGradient>
    <filter id="glow11"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft11"><feGaussianBlur stdDeviation="30" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg11)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="112" x2="800" y2="112"/><line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="337" x2="800" y2="337"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <circle cx="400" cy="215" r="165" fill="#ff6b35" opacity="0.04" filter="url(#soft11)"/>
  <!-- Target/crosshair -->
  <circle cx="400" cy="210" r="100" stroke="#ff6b35" stroke-width="0.8" opacity="0.15"/>
  <circle cx="400" cy="210" r="70" stroke="#ff8c42" stroke-width="0.8" opacity="0.2"/>
  <circle cx="400" cy="210" r="40" stroke="#ff6b35" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="210" r="12" fill="rgba(255,107,53,0.15)" stroke="#ff6b35" stroke-width="1.2" opacity="0.6"/>
  <circle cx="400" cy="210" r="4" fill="#ff6b35" opacity="0.9" filter="url(#glow11)"/>
  <!-- Crosshair lines -->
  <line x1="400" y1="100" x2="400" y2="190" stroke="#ff6b35" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="230" x2="400" y2="320" stroke="#ff6b35" stroke-width="0.6" opacity="0.2"/>
  <line x1="290" y1="210" x2="380" y2="210" stroke="#ff6b35" stroke-width="0.6" opacity="0.2"/>
  <line x1="420" y1="210" x2="510" y2="210" stroke="#ff6b35" stroke-width="0.6" opacity="0.2"/>
  <!-- Bar chart (ROI) -->
  <rect x="570" y="280" width="24" height="50" rx="2" fill="#ff6b35" opacity="0.25"/>
  <rect x="600" y="260" width="24" height="70" rx="2" fill="#ff6b35" opacity="0.35"/>
  <rect x="630" y="230" width="24" height="100" rx="2" fill="#ff6b35" opacity="0.5"/>
  <rect x="660" y="200" width="24" height="130" rx="2" fill="#ff8c42" opacity="0.6" filter="url(#glow11)"/>
  <line x1="565" y1="330" x2="690" y2="330" stroke="#ff6b35" stroke-width="0.6" opacity="0.2"/>
  <!-- Currency symbols scattered -->
  <text x="180" y="160" font-family="Inter,sans-serif" font-size="14" fill="#ff6b35" opacity="0.15">$</text>
  <text x="220" y="280" font-family="Inter,sans-serif" font-size="12" fill="#ff8c42" opacity="0.12">$</text>
  <text x="160" y="230" font-family="Inter,sans-serif" font-size="10" fill="#ff6b35" opacity="0.1">$</text>
  <!-- Click cursor -->
  <path d="M415,195 L425,210 L420,212 L428,228 L424,230 L416,214 L412,218 Z" fill="#ff6b35" opacity="0.5" filter="url(#glow11)"/>
  <text x="400" y="405" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#ff6b35" text-anchor="middle" opacity="0.35">GOOGLE ADS &amp; ROI</text>
  <g stroke="#ff6b35" stroke-width="1" opacity="0.18">
    <line x1="24" y1="24" x2="60" y2="24"/><line x1="24" y1="24" x2="24" y2="60"/>
    <line x1="740" y1="426" x2="776" y2="426"/><line x1="776" y1="390" x2="776" y2="426"/>
  </g>
</svg>