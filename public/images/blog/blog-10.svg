<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/><stop offset="100%" style="stop-color:#12101e"/>
    </linearGradient>
    <filter id="glow10"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft10"><feGaussianBlur stdDeviation="30" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg10)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="112" x2="800" y2="112"/><line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="337" x2="800" y2="337"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <circle cx="400" cy="210" r="170" fill="#ff6b35" opacity="0.04" filter="url(#soft10)"/>
  <!-- Film strip / timeline -->
  <rect x="120" y="195" width="560" height="40" rx="4" stroke="#ff6b35" stroke-width="0.8" opacity="0.2"/>
  <!-- Frames -->
  <rect x="140" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.06)" stroke="#ff6b35" stroke-width="0.6" opacity="0.3"/>
  <rect x="200" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.08)" stroke="#ff6b35" stroke-width="0.6" opacity="0.35"/>
  <rect x="260" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.1)" stroke="#ff6b35" stroke-width="0.6" opacity="0.4"/>
  <rect x="320" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.12)" stroke="#ff8c42" stroke-width="0.8" opacity="0.5"/>
  <rect x="380" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.15)" stroke="#ff6b35" stroke-width="0.8" opacity="0.55"/>
  <rect x="440" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.12)" stroke="#ff8c42" stroke-width="0.6" opacity="0.45"/>
  <rect x="500" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.08)" stroke="#ff6b35" stroke-width="0.6" opacity="0.35"/>
  <rect x="560" y="200" width="50" height="30" rx="3" fill="rgba(255,107,53,0.06)" stroke="#ff6b35" stroke-width="0.6" opacity="0.3"/>
  <!-- Motion arcs above -->
  <path d="M200,170 Q260,120 320,170" stroke="#ff6b35" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M320,170 Q400,100 480,170" stroke="#ff8c42" stroke-width="1.2" fill="none" opacity="0.35" filter="url(#glow10)"/>
  <path d="M480,170 Q540,130 600,170" stroke="#ff6b35" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Motion dots -->
  <circle cx="260" cy="140" r="3" fill="#ff6b35" opacity="0.5" filter="url(#glow10)"/>
  <circle cx="400" cy="108" r="5" fill="#ff6b35" opacity="0.8" filter="url(#glow10)"/>
  <circle cx="540" cy="145" r="3" fill="#ff8c42" opacity="0.45" filter="url(#glow10)"/>
  <!-- Bezier handles -->
  <line x1="380" y1="200" x2="400" y2="108" stroke="#ff6b35" stroke-width="0.5" opacity="0.1" stroke-dasharray="2 3"/>
  <!-- Play triangle -->
  <polygon points="390,270 390,310 420,290" fill="#ff6b35" opacity="0.5" filter="url(#glow10)"/>
  <text x="400" y="405" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#ff6b35" text-anchor="middle" opacity="0.35">MOTION &amp; STORYTELLING</text>
  <g stroke="#ff6b35" stroke-width="1" opacity="0.18">
    <line x1="24" y1="24" x2="60" y2="24"/><line x1="24" y1="24" x2="24" y2="60"/>
    <line x1="740" y1="426" x2="776" y2="426"/><line x1="776" y1="390" x2="776" y2="426"/>
  </g>
</svg>