<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg08" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/><stop offset="100%" style="stop-color:#12101e"/>
    </linearGradient>
    <filter id="glow08"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft08"><feGaussianBlur stdDeviation="30" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg08)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="112" x2="800" y2="112"/><line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="337" x2="800" y2="337"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <circle cx="400" cy="210" r="160" fill="#ff6b35" opacity="0.04" filter="url(#soft08)"/>
  <!-- Butterfly/transformation: two mirrored shapes -->
  <path d="M400,210 Q320,140 280,210 Q320,280 400,210" stroke="#ff6b35" stroke-width="1.2" fill="rgba(255,107,53,0.05)" opacity="0.6"/>
  <path d="M400,210 Q480,140 520,210 Q480,280 400,210" stroke="#ff8c42" stroke-width="1.2" fill="rgba(255,140,66,0.04)" opacity="0.5"/>
  <!-- Old identity (fading) -->
  <rect x="160" y="170" width="60" height="60" rx="8" stroke="#ff6b35" stroke-width="0.8" opacity="0.15" stroke-dasharray="3 3"/>
  <rect x="170" y="180" width="40" height="8" rx="2" fill="#ff6b35" opacity="0.12"/>
  <rect x="170" y="196" width="30" height="5" rx="2" fill="#fff" opacity="0.04"/>
  <!-- New identity (emerging) -->
  <rect x="580" y="170" width="60" height="60" rx="8" stroke="#ff6b35" stroke-width="1.2" opacity="0.5"/>
  <rect x="590" y="180" width="40" height="8" rx="2" fill="#ff6b35" opacity="0.6"/>
  <rect x="590" y="196" width="30" height="5" rx="2" fill="#fff" opacity="0.1"/>
  <!-- Arrow of transformation -->
  <line x1="240" y1="200" x2="560" y2="200" stroke="#ff6b35" stroke-width="0.6" opacity="0.12" stroke-dasharray="6 4"/>
  <!-- Center diamond -->
  <polygon points="400,180 420,210 400,240 380,210" fill="rgba(255,107,53,0.1)" stroke="#ff6b35" stroke-width="1.2" opacity="0.6"/>
  <circle cx="400" cy="210" r="5" fill="#ff6b35" opacity="0.8" filter="url(#glow08)"/>
  <!-- Scattered dots -->
  <circle cx="310" cy="160" r="3" fill="#ff6b35" opacity="0.4" filter="url(#glow08)"/>
  <circle cx="490" cy="160" r="3" fill="#ff8c42" opacity="0.4" filter="url(#glow08)"/>
  <circle cx="310" cy="260" r="3" fill="#ff8c42" opacity="0.35" filter="url(#glow08)"/>
  <circle cx="490" cy="260" r="3" fill="#ff6b35" opacity="0.35" filter="url(#glow08)"/>
  <text x="400" y="405" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#ff6b35" text-anchor="middle" opacity="0.35">BRAND TRANSFORMATION</text>
  <g stroke="#ff6b35" stroke-width="1" opacity="0.18">
    <line x1="24" y1="24" x2="60" y2="24"/><line x1="24" y1="24" x2="24" y2="60"/>
    <line x1="740" y1="426" x2="776" y2="426"/><line x1="776" y1="390" x2="776" y2="426"/>
  </g>
</svg>